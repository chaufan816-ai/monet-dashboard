<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giverny — Nuestro Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant+SC:wght@300;400;500;600&family=Italianno&display=swap" rel="stylesheet">
<style>
  :root{
    --agua:#88b4d6;
    --agua-prof:#3d6b8a;
    --jardin:#5a7a4a;
    --jardin-prof:#2f4a3a;
    --lavanda:#c5b8d8;
    --salvia:#bcc9a8;
    --crema:#f5ecd9;
    --crema-claro:#fbf6e8;
    --rosa:#e8b8c4;
    --dorado:#c69a4a;
    --tinta:#283f3a;
    --niebla:rgba(251,246,232,0.88);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Cormorant Garamond',Georgia,serif;
    color:var(--tinta);
    background:#1a2535;
    -webkit-font-smoothing:antialiased;
  }
  .canvas-grain{
    position:fixed;inset:0;pointer-events:none;z-index:200;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.85  0 0 0 0.18 0'/></filter><rect width='220' height='220' filter='url(%23n)' opacity='0.55'/></svg>");
    mix-blend-mode:overlay;opacity:.35;
  }
  #login{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#1a2535;z-index:100;transition:opacity 1.4s ease;overflow:hidden;
  }
  #login.gone{opacity:0;pointer-events:none}
  .bg-static, .bg-water{
    position:absolute;inset:0;background-size:cover;background-position:center;
  }
  #login .bg-static{
    background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Claude_Monet_-_The_Water_Lily_Pond_-_Google_Art_Project.jpg/1600px-Claude_Monet_-_The_Water_Lily_Pond_-_Google_Art_Project.jpg');
    animation:burns 35s ease-in-out infinite alternate;
  }
  #login .bg-water{
    background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Claude_Monet_-_The_Water_Lily_Pond_-_Google_Art_Project.jpg/1600px-Claude_Monet_-_The_Water_Lily_Pond_-_Google_Art_Project.jpg');
    animation:burns 35s ease-in-out infinite alternate;
    -webkit-mask-image:linear-gradient(to bottom, transparent 50%, black 70%);
            mask-image:linear-gradient(to bottom, transparent 50%, black 70%);
    filter:url(#waterShimmer);
  }
  #login::after{
    content:"";position:absolute;inset:0;z-index:1;
    background:radial-gradient(ellipse at center, transparent 30%, rgba(20,30,40,0.55) 90%);
  }
  @keyframes burns{
    0%{transform:scale(1) translate(0,0)}
    100%{transform:scale(1.1) translate(-1.5%,-1%)}
  }
  .card{
    position:relative;z-index:3;
    background:var(--niebla);backdrop-filter:blur(10px);
    padding:3.5rem 3rem;border-radius:3px;
    box-shadow:0 30px 80px rgba(0,0,0,0.45),0 0 0 1px rgba(198,154,74,0.35),inset 0 0 60px rgba(245,236,217,0.4);
    text-align:center;max-width:430px;width:90%;
    animation:floatIn 1.6s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes floatIn{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
  .card h1{
    font-family:'Italianno',cursive;font-weight:400;font-size:4.2rem;
    color:var(--agua-prof);margin-bottom:.2rem;line-height:.9;
  }
  .card .sigla{
    font-family:'Cormorant SC',serif;font-size:.85rem;letter-spacing:.5em;
    color:var(--dorado);padding-left:.5em;margin-bottom:.4rem;
  }
  .card .ornament{
    color:var(--dorado);font-size:1.1rem;letter-spacing:1.2em;
    margin:.4rem 0 1.3rem;padding-left:1.2em;
  }
  .card p.lead{font-style:italic;font-size:1.1rem;color:var(--tinta);opacity:.78;margin-bottom:2rem;line-height:1.5}
  .card p.lead .sig{display:block;font-size:.85rem;letter-spacing:.18em;margin-top:.5rem;font-style:normal;opacity:.6}
  .field{position:relative;margin-bottom:1.2rem}
  .field input{
    width:100%;padding:.9rem 1rem;border:none;border-bottom:1px solid var(--agua-prof);
    background:transparent;font-family:inherit;font-size:1.15rem;
    color:var(--tinta);text-align:center;letter-spacing:.18em;outline:none;transition:border-color .4s;
  }
  .field input::placeholder{color:#7a8a8a;font-style:italic;letter-spacing:.05em}
  .field input:focus{border-color:var(--dorado)}
  .btn{
    background:var(--agua-prof);color:var(--crema-claro);border:none;
    padding:.85rem 2.5rem;font-family:'Cormorant SC',serif;font-size:1rem;
    letter-spacing:.28em;cursor:pointer;transition:all .5s ease;border-radius:1px;
  }
  .btn:hover{background:var(--dorado);color:var(--tinta);letter-spacing:.34em}
  .err{color:#9a4040;font-style:italic;font-size:.95rem;margin-top:1rem;min-height:1.2em}
  #app{position:fixed;inset:0;display:none;flex-direction:column;opacity:0;transition:opacity 1.4s ease}
  #app.show{display:flex;opacity:1}
  .bg-stage{position:absolute;inset:0;z-index:0;overflow:hidden;background:#1a2535}
  .slide-pair{position:absolute;inset:0;opacity:0;transition:opacity 3s ease-in-out}
  .slide-pair.active{opacity:1}
  .slide-pair .layer{
    position:absolute;inset:0;background-size:cover;background-position:center;
    animation:burns 28s ease-in-out infinite alternate;
  }
  .slide-pair .layer.water{
    -webkit-mask-image:linear-gradient(to bottom, transparent 42%, black 60%);
            mask-image:linear-gradient(to bottom, transparent 42%, black 60%);
    filter:url(#waterShimmer);
  }
  .bg-stage::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(20,30,40,0.32) 0%, rgba(20,30,40,0.55) 100%);
    pointer-events:none;
  }
  .lilies{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
  .lily{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, var(--rosa), var(--lavanda) 60%, transparent 78%);
    opacity:.45;filter:blur(1.5px);animation:drift linear infinite;
  }
  @keyframes drift{0%{transform:translate(0,0) rotate(0)}100%{transform:translate(120vw,-30vh) rotate(360deg)}}
  header{
    position:relative;z-index:3;padding:1.5rem 2.5rem;
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(180deg, rgba(251,246,232,0.94) 0%, rgba(251,246,232,0.72) 100%);
    border-bottom:1px solid rgba(198,154,74,0.4);backdrop-filter:blur(8px);
  }
  header .brand{display:flex;align-items:baseline;gap:.7rem}
  header h2{font-family:'Italianno',cursive;font-weight:400;font-size:2.6rem;color:var(--agua-prof);line-height:1}
  header .sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--tinta);opacity:.65;font-size:.95rem}
  .logout{
    background:transparent;border:1px solid var(--agua-prof);
    color:var(--agua-prof);padding:.45rem 1.3rem;cursor:pointer;
    font-family:'Cormorant SC',serif;letter-spacing:.22em;font-size:.8rem;transition:all .4s;
  }
  .logout:hover{background:var(--agua-prof);color:var(--crema-claro)}
  main{position:relative;z-index:3;flex:1;overflow-y:auto;padding:2rem 2.5rem 4rem}
  main::-webkit-scrollbar{width:8px}
  main::-webkit-scrollbar-track{background:rgba(245,236,217,0.2)}
  main::-webkit-scrollbar-thumb{background:var(--agua-prof);border-radius:4px}
  .tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
  .tab{
    background:rgba(251,246,232,0.85);backdrop-filter:blur(6px);
    border:1px solid rgba(61,107,138,0.3);padding:.7rem 2rem;cursor:pointer;
    font-family:'Cormorant SC',serif;font-size:1rem;letter-spacing:.22em;
    color:var(--tinta);transition:all .4s;border-radius:1px;
  }
  .tab:hover{background:var(--niebla);transform:translateY(-2px)}
  .tab.active{background:var(--agua-prof);color:var(--crema-claro);box-shadow:0 6px 22px rgba(61,107,138,0.45)}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
  .toolbar .filter{
    background:rgba(251,246,232,0.85);border:none;padding:.6rem 1rem;
    font-family:inherit;font-size:1rem;color:var(--tinta);border-radius:1px;
    border:1px solid rgba(61,107,138,0.25);min-width:200px;
  }
  .add-btn{
    background:var(--dorado);color:var(--crema-claro);border:none;
    padding:.7rem 1.6rem;font-family:'Cormorant SC',serif;letter-spacing:.22em;
    font-size:.9rem;cursor:pointer;border-radius:1px;
    box-shadow:0 6px 20px rgba(198,154,74,0.45);transition:all .4s;
  }
  .add-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(198,154,74,0.55)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.4rem}
  .item{
    background:var(--niebla);backdrop-filter:blur(10px);
    padding:1.5rem;border-radius:2px;border:1px solid rgba(198,154,74,0.28);
    box-shadow:0 14px 40px rgba(20,30,40,0.28);
    transition:all .5s ease;position:relative;animation:rise .7s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
  .item:hover{transform:translateY(-4px);box-shadow:0 22px 52px rgba(20,30,40,0.38)}
  .item.done{opacity:.78}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:.6rem;margin-bottom:.4rem}
  .item h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.55rem;color:var(--agua-prof);line-height:1.2}
  .item .badge{font-family:'Cormorant SC',serif;font-size:.7rem;letter-spacing:.2em;padding:.25rem .65rem;border-radius:20px;white-space:nowrap}
  .badge.pend{background:var(--rosa);color:#7a3a48}
  .badge.done{background:var(--salvia);color:#3a4a30}
  .item .place{font-style:italic;color:var(--tinta);opacity:.7;font-size:.95rem;margin-bottom:.6rem}
  .item .notes{color:var(--tinta);font-size:1rem;line-height:1.45;margin-bottom:.8rem;opacity:.85}
  .hearts{font-size:1.1rem;letter-spacing:.1em;margin-bottom:.8rem;color:#ccc}
  .hearts span{cursor:pointer;transition:transform .2s}
  .hearts span:hover{transform:scale(1.2)}
  .hearts span.on{color:#c66}
  .actions{display:flex;gap:.5rem;justify-content:flex-end;border-top:1px solid rgba(61,107,138,0.15);padding-top:.7rem}
  .icon-btn{
    background:transparent;border:1px solid rgba(61,107,138,0.3);
    padding:.35rem .8rem;cursor:pointer;font-family:'Cormorant SC',serif;
    letter-spacing:.16em;font-size:.72rem;color:var(--agua-prof);transition:all .4s;border-radius:1px;
  }
  .icon-btn:hover{background:var(--agua-prof);color:var(--crema-claro)}
  .icon-btn.del:hover{background:#9a4040;border-color:#9a4040;color:var(--crema-claro)}
  .empty{text-align:center;padding:4rem 1rem;color:var(--crema-claro);font-family:'Italianno',cursive;font-size:2rem;opacity:.95;text-shadow:0 2px 12px rgba(0,0,0,0.5)}
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,40,0.7);backdrop-filter:blur(5px);z-index:50;display:none;align-items:center;justify-content:center;padding:1rem}
  .modal-bg.show{display:flex;animation:fade .3s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--crema-claro);padding:2.5rem;border-radius:3px;width:100%;max-width:500px;box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:floatIn .6s cubic-bezier(.2,.8,.2,1)}
  .modal h3{font-family:'Italianno',cursive;font-weight:400;font-size:2.3rem;color:var(--agua-prof);text-align:center;margin-bottom:1.2rem}
  .modal label{display:block;font-family:'Cormorant SC',serif;font-size:.78rem;letter-spacing:.22em;color:var(--agua-prof);margin-bottom:.3rem;margin-top:.9rem}
  .modal input,.modal textarea,.modal select{width:100%;padding:.7rem .9rem;border:1px solid rgba(61,107,138,0.3);font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--tinta);background:white;border-radius:1px;outline:none}
  .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--dorado)}
  .modal textarea{resize:vertical;min-height:75px;font-family:inherit}
  .modal .row{display:flex;gap:1rem;margin-top:1.6rem;justify-content:flex-end}
  @media (max-width:600px){
    header{padding:1.2rem 1.2rem;flex-direction:column;gap:.6rem;text-align:center}
    main{padding:1.2rem 1rem 3rem}
    .card{padding:2.5rem 1.8rem}
    .card h1{font-size:3.4rem}
  }
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <defs>
    <filter id="waterShimmer" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.028" numOctaves="2" seed="3" result="noise">
        <animate attributeName="baseFrequency" dur="22s"
          values="0.014 0.028; 0.018 0.034; 0.014 0.028" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="canvas-grain"></div>

<section id="login">
  <div class="bg-static"></div>
  <div class="bg-water"></div>
  <div class="card">
    <div class="sigla">CLAUDE MONET</div>
    <h1>Giverny</h1>
    <div class="ornament">&middot; &middot; &middot;</div>
    <p class="lead">"No pinto la naturaleza, sino el aire que la rodea,<br>la luz, la atmósfera, lo intangible."<span class="sig">— C. M.</span></p>
    <form id="loginForm">
      <div class="field">
        <input type="password" id="pwd" placeholder="palabra clave" autocomplete="off" autofocus />
      </div>
      <button type="submit" class="btn">Ingresar</button>
      <div class="err" id="err"></div>
    </form>
  </div>
</section>

<section id="app">
  <div class="bg-stage" id="bgStage"></div>
  <div class="lilies" id="lilies"></div>
  <header>
    <div class="brand">
      <h2>Nuestro Atelier</h2>
      <span class="sub">— planes, lugares y mesas para compartir</span>
    </div>
    <button class="logout" id="logoutBtn">Salir</button>
  </header>
  <main>
    <div class="tabs">
      <button class="tab active" data-cat="restoran">Restoranes</button>
      <button class="tab" data-cat="lugar">Lugares</button>
      <button class="tab" data-cat="plan">Planes</button>
    </div>
    <div class="toolbar">
      <select class="filter" id="statusFilter">
        <option value="all">Todos los estados</option>
        <option value="pend">Pendientes</option>
        <option value="done">Visitados / hechos</option>
      </select>
      <button class="add-btn" id="addBtn">+ Agregar</button>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</section>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Nueva pincelada</h3>
    <form id="itemForm">
      <input type="hidden" id="itemId" />
      <label>Nombre</label>
      <input type="text" id="fName" required />
      <label>Categoria</label>
      <select id="fCat">
        <option value="restoran">Restoran</option>
        <option value="lugar">Lugar</option>
        <option value="plan">Plan</option>
      </select>
      <label>Lugar / Direccion</label>
      <input type="text" id="fPlace" placeholder="Palermo, Buenos Aires..." />
      <label>Notas</label>
      <textarea id="fNotes" placeholder="que nos gusto, cuando, con quien..."></textarea>
      <label>Estado</label>
      <select id="fStatus">
        <option value="pend">Pendiente</option>
        <option value="done">Visitado / hecho</option>
      </select>
      <div class="row">
        <button type="button" class="icon-btn" id="cancelBtn">Cancelar</button>
        <button type="submit" class="btn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
const loginEl = document.getElementById('login');
const appEl   = document.getElementById('app');
const errEl   = document.getElementById('err');

document.getElementById('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  const v = document.getElementById('pwd').value.trim().toLowerCase();
  if (v === 'fortuna') { sessionStorage.setItem('giverny_in','1'); enter(); }
  else {
    errEl.textContent = 'La palabra no abre esta puerta...';
    document.getElementById('pwd').value='';
    setTimeout(()=>errEl.textContent='', 2800);
  }
});
document.getElementById('logoutBtn').addEventListener('click', ()=>{ sessionStorage.removeItem('giverny_in'); location.reload(); });

function enter(){
  loginEl.classList.add('gone');
  setTimeout(()=>{
    loginEl.style.display='none';
    appEl.classList.add('show');
    initBg(); initLilies(); render();
  }, 1300);
}
if (sessionStorage.getItem('giverny_in')==='1') enter();

const paintings = [
  'https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Claude_Monet_-_Water_Lilies_-_1906%2C_Ryerson.jpg/1600px-Claude_Monet_-_Water_Lilies_-_1906%2C_Ryerson.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Claude_Monet_-_Le_Bassin_Aux_Nymph%C3%A9as_-_Google_Art_Project.jpg/1600px-Claude_Monet_-_Le_Bassin_Aux_Nymph%C3%A9as_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Claude_Monet_The_Cliff_Walk_at_Pourville_1882.jpg/1600px-Claude_Monet_The_Cliff_Walk_at_Pourville_1882.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Claude_Monet_-_Meule_-_Google_Art_Project.jpg/1600px-Claude_Monet_-_Meule_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Monet_-_Impression%2C_Sunrise.jpg/1600px-Monet_-_Impression%2C_Sunrise.jpg'
];
let bgIdx = 0;
function initBg(){
  const stage = document.getElementById('bgStage');
  paintings.forEach((url,i)=>{
    const pair = document.createElement('div');
    pair.className = 'slide-pair' + (i===0?' active':'');
    const back = document.createElement('div');
    back.className = 'layer';
    back.style.backgroundImage = "url('" + url + "')";
    back.style.animationDelay = (i*-3)+'s';
    const water = document.createElement('div');
    water.className = 'layer water';
    water.style.backgroundImage = "url('" + url + "')";
    water.style.animationDelay = (i*-3)+'s';
    pair.appendChild(back); pair.appendChild(water);
    stage.appendChild(pair);
  });
  setInterval(()=>{
    const pairs = stage.querySelectorAll('.slide-pair');
    pairs[bgIdx].classList.remove('active');
    bgIdx = (bgIdx+1) % pairs.length;
    pairs[bgIdx].classList.add('active');
  }, 9000);
}

function initLilies(){
  const c = document.getElementById('lilies');
  for (let i=0;i<14;i++){
    const l = document.createElement('div'); l.className='lily';
    const size = 20 + Math.random()*60;
    l.style.width = size+'px'; l.style.height = size+'px';
    l.style.left = (-10 + Math.random()*30)+'%';
    l.style.top  = (60 + Math.random()*60)+'%';
    l.style.animationDuration = (40 + Math.random()*60)+'s';
    l.style.animationDelay = (-Math.random()*60)+'s';
    l.style.opacity = .25 + Math.random()*.35;
    c.appendChild(l);
  }
}

const KEY = 'giverny_items_v2';
let items = JSON.parse(localStorage.getItem(KEY) || 'null') || [
  { id:uid(), name:'Don Julio', cat:'restoran', place:'Palermo, BA', notes:'Parrilla clasica, anotada hace meses.', status:'pend', hearts:0 },
  { id:uid(), name:'Showcase', cat:'restoran', place:'Buenos Aires', notes:'Para una noche especial.', status:'pend', hearts:0 },
  { id:uid(), name:'Kalis', cat:'restoran', place:'Buenos Aires', notes:'Probar la cocina.', status:'pend', hearts:0 },
  { id:uid(), name:'Museo Malba', cat:'lugar', place:'Av. Figueroa Alcorta 3415, CABA', notes:'Coleccion de arte latinoamericano + cafe.', status:'pend', hearts:0 },
  { id:uid(), name:'Bosques de Palermo al atardecer', cat:'lugar', place:'CABA', notes:'Caminata + mate.', status:'pend', hearts:3 },
  { id:uid(), name:'Maraton de peliculas francesas', cat:'plan', place:'En casa', notes:'Amelie, Le Fabuleux Destin, La Vie en Rose.', status:'done', hearts:5 }
];
function uid(){ return Math.random().toString(36).slice(2,9) }
function save(){ localStorage.setItem(KEY, JSON.stringify(items)) }

let currentCat = 'restoran';
let currentStatus = 'all';

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    currentCat = t.dataset.cat;
    render();
  });
});
document.getElementById('statusFilter').addEventListener('change', e=>{ currentStatus = e.target.value; render(); });

function render(){
  const grid = document.getElementById('grid');
  const list = items.filter(i=>i.cat===currentCat).filter(i=>currentStatus==='all'||i.status===currentStatus);
  if (!list.length){
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">un lienzo en blanco esperando la primera pincelada...</div>';
    return;
  }
  grid.innerHTML = list.map(i=>`
    <div class="item ${i.status==='done'?'done':''}">
      <div class="top">
        <h3>${esc(i.name)}</h3>
        <span class="badge ${i.status==='done'?'done':'pend'}">${i.status==='done'?'visitado':'pendiente'}</span>
      </div>
      ${i.place?`<div class="place">${esc(i.place)}</div>`:''}
      ${i.notes?`<div class="notes">${esc(i.notes)}</div>`:''}
      <div class="hearts" data-id="${i.id}">
        ${[1,2,3,4,5].map(n=>`<span class="${n<=i.hearts?'on':''}" data-n="${n}">&hearts;</span>`).join('')}
      </div>
      <div class="actions">
        <button class="icon-btn" onclick="toggleStatus('${i.id}')">${i.status==='done'?'Pendiente':'Visitado'}</button>
        <button class="icon-btn" onclick="edit('${i.id}')">Editar</button>
        <button class="icon-btn del" onclick="del('${i.id}')">Borrar</button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.hearts').forEach(h=>{
    h.querySelectorAll('span').forEach(s=>{
      s.addEventListener('click', ()=>{
        const id = h.dataset.id, n = +s.dataset.n;
        const it = items.find(x=>x.id===id);
        it.hearts = it.hearts===n ? n-1 : n;
        save(); render();
      });
    });
  });
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

window.toggleStatus = id => {
  const it = items.find(x=>x.id===id);
  it.status = it.status==='done' ? 'pend' : 'done';
  save(); render();
};
window.del = id => {
  if (!confirm('Borrar esta pincelada?')) return;
  items = items.filter(x=>x.id!==id);
  save(); render();
};
window.edit = id => openModal(items.find(x=>x.id===id));

const modalBg = document.getElementById('modalBg');
document.getElementById('addBtn').addEventListener('click', ()=>openModal());
document.getElementById('cancelBtn').addEventListener('click', closeModal);
modalBg.addEventListener('click', e=>{ if(e.target===modalBg) closeModal() });

function openModal(it){
  document.getElementById('modalTitle').textContent = it ? 'Editar pincelada' : 'Nueva pincelada';
  document.getElementById('itemId').value = it?.id || '';
  document.getElementById('fName').value = it?.name || '';
  document.getElementById('fCat').value  = it?.cat  || currentCat;
  document.getElementById('fPlace').value= it?.place|| '';
  document.getElementById('fNotes').value= it?.notes|| '';
  document.getElementById('fStatus').value= it?.status || 'pend';
  modalBg.classList.add('show');
}
function closeModal(){ modalBg.classList.remove('show') }

document.getElementById('itemForm').addEventListener('submit', e=>{
  e.preventDefault();
  const id = document.getElementById('itemId').value;
  const data = {
    name:  document.getElementById('fName').value.trim(),
    cat:   document.getElementById('fCat').value,
    place: document.getElementById('fPlace').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    status:document.getElementById('fStatus').value
  };
  if (id){ Object.assign(items.find(x=>x.id===id), data); }
  else { items.unshift({ id:uid(), hearts:0, ...data }); }
  save(); closeModal();
  document.querySelectorAll('.tab').forEach(t=>{ t.classList.toggle('active', t.dataset.cat===data.cat); });
  currentCat = data.cat;
  render();
});
</script>
</body>
</html>
